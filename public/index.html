<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeUI — Design Skill Files</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --border2: #2a2a2a;
    --text: #f0f0f0;
    --text2: #888888;
    --text3: #555555;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --green: #22c55e;
    --radius: 10px;
  }

  html { height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .header-badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-sm {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--text); }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search::placeholder { color: var(--text3); }
  .search:focus { border-color: var(--accent); }

  .skill-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }
  .skill-list::-webkit-scrollbar { width: 4px; }
  .skill-list::-webkit-scrollbar-track { background: transparent; }
  .skill-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .skill-card {
    border-radius: var(--radius);
    border: 1px solid transparent;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 4px;
  }
  .skill-card:hover { background: var(--surface); border-color: var(--border2); }
  .skill-card.active { background: var(--surface2); border-color: var(--accent); }

  .skill-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .color-dot {
    width: 28px; height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .skill-card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .skill-card-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .mood-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .mood-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text3);
    border: 1px solid var(--border2);
  }
  .skill-card.active .mood-tag { border-color: rgba(124,58,237,0.3); color: var(--accent2); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }
  .main::-webkit-scrollbar { width: 4px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--text3);
    text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 300px; }

  /* ── SKILL DETAIL ── */
  .skill-detail { max-width: 860px; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 20px;
  }

  .detail-title-area {}

  .detail-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .detail-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    max-width: 500px;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-copy:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-copy.copied { background: linear-gradient(135deg, #166534, var(--green)); }

  .btn-outline {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }

  /* ── GRID ── */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .detail-grid.full { grid-template-columns: 1fr; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  /* ── COLORS ── */
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 7px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    transition: transform 0.1s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.1); }

  .color-info {}
  .color-label { font-size: 11px; color: var(--text3); margin-bottom: 1px; }
  .color-hex {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
  }

  /* ── TYPOGRAPHY ── */
  .typo-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .typo-row:last-child { border-bottom: none; }
  .typo-label { font-size: 12px; color: var(--text3); }
  .typo-value { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; text-align: right; }

  /* ── PRINCIPLES ── */
  .principle-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }
  .principle-item:last-child { border-bottom: none; }
  .principle-dot { color: var(--accent2); flex-shrink: 0; margin-top: 1px; }

  /* ── PROMPT BLOCK ── */
  .prompt-block {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .prompt-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .prompt-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: #c8d3f5;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 320px;
    overflow-y: auto;
  }
  .prompt-text::-webkit-scrollbar { width: 4px; }
  .prompt-text::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── MOOD PALETTE ── */
  .palette-strip {
    display: flex;
    height: 48px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
    margin-bottom: 16px;
  }
  .palette-color { flex: 1; transition: flex 0.2s; cursor: pointer; }
  .palette-color:hover { flex: 2; }

  /* ── EDIT PANEL ── */
  .edit-panel {
    display: none;
    margin-bottom: 16px;
  }
  .edit-panel.open { display: block; }

  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .edit-field label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .edit-field-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .edit-color-preview {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .edit-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .edit-input:focus { border-color: var(--accent); }

  .edit-save-row {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .btn-save {
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 7px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-shape-preset {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-shape-preset:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── PREVIEW BUTTON ── */
  .btn-preview {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 24px;
    margin-top: 8px;
    margin-bottom: 32px;
    border-radius: 10px;
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-preview:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(124,58,237,0.06);
  }
  .btn-preview .preview-icon { font-size: 18px; }

  /* ── PREVIEW MODAL ── */
  .preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .preview-overlay.open { display: flex; }

  .preview-modal {
    width: 100%;
    max-width: 1100px;
    height: calc(100vh - 80px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .preview-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .preview-modal-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .preview-skill-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(124,58,237,0.15);
    color: var(--accent2);
    border: 1px solid rgba(124,58,237,0.3);
    font-family: 'JetBrains Mono', monospace;
  }

  .preview-modal-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-size-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text3);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .preview-size-btn:hover, .preview-size-btn.active {
    border-color: var(--accent);
    color: var(--text);
  }

  .preview-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .preview-close:hover { border-color: #ef4444; color: #ef4444; }

  .preview-frame-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
    background: #050505;
    transition: all 0.3s;
  }

  .preview-frame-wrap.mobile {
    padding: 16px;
    align-items: flex-start;
  }

  #previewFrame {
    width: 100%;
    height: 100%;
    border: none;
    transition: all 0.3s;
    border-radius: 0;
  }

  .preview-frame-wrap.mobile #previewFrame {
    width: 390px;
    height: 100%;
    border-radius: 12px;
    border: 1px solid var(--border2);
  }

  /* ── LANG SWITCHER ── */
  .lang-switcher { position: relative; }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
    user-select: none;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--text); }
  .lang-btn .lang-arrow { font-size: 9px; opacity: 0.5; transition: transform 0.2s; }
  .lang-btn.open .lang-arrow { transform: rotate(180deg); }

  .lang-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 6px;
    min-width: 160px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 500;
  }
  .lang-dropdown.open { display: block; }

  .lang-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.1s;
    font-family: inherit;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .lang-item:hover { background: var(--border); color: var(--text); }
  .lang-item.active { color: var(--accent2); background: rgba(124,58,237,0.1); }
  .lang-item .lang-flag { font-size: 16px; line-height: 1; }
  .lang-item .lang-name { flex: 1; }
  .lang-item .lang-code { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }

  /* ── EXPORT BAR ── */
  .export-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .export-bar-label {
    font-size: 12px;
    color: var(--text3);
    font-weight: 500;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .btn-export {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-export:hover { background: var(--surface); color: var(--text); }
  .btn-export.html:hover  { border-color: #e34c26; color: #e34c26; }
  .btn-export.css:hover   { border-color: #264de4; color: #264de4; }
  .btn-export.tw:hover    { border-color: #38bdf8; color: #38bdf8; }
  .btn-export.react:hover { border-color: #61dafb; color: #61dafb; }
  .btn-export.vue:hover   { border-color: #42b883; color: #42b883; }
  .btn-export .ext-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .btn-export.html .ext-dot  { background: #e34c26; }
  .btn-export.css .ext-dot   { background: #264de4; }
  .btn-export.tw .ext-dot    { background: #38bdf8; }
  .btn-export.react .ext-dot { background: #61dafb; }
  .btn-export.vue .ext-dot   { background: #42b883; }

  /* ── EXPORT MODAL ── */
  .export-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    z-index: 1100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .export-overlay.open { display: flex; }
  .export-modal {
    width: 100%;
    max-width: 860px;
    max-height: calc(100vh - 80px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }
  .export-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid var(--border);

  function t(key) {
    const d = I18N[currentLang] || I18N.en;
    return d[key] !== undefined ? d[key] : (I18N.en[key] || key);
  }

  function applyStaticTranslations() {
    const d = I18N[currentLang] || I18N.en;
    document.getElementById('sidebarTitle').textContent = d.sidebarTitle;
    document.getElementById('searchInput').placeholder = d.searchPlaceholder;
    document.getElementById('emptyTitle').textContent = d.emptyTitle;
    document.getElementById('emptyDesc').textContent = d.emptyDesc;
    document.getElementById('previewModalTitle').textContent = d.previewModalTitle;
    document.getElementById('btnDesktop').textContent = d.desktopBtn;
    document.getElementById('btnMobile').textContent = d.mobileBtn;
    if (allSkills.length) {
      document.getElementById('skillCountBadge').textContent = d.skillsBadge(allSkills.length);
    }
  }

  // ── LANG SWITCHER ──
  function toggleLangDropdown() {
    document.getElementById('langBtn').classList.toggle('open');
    document.getElementById('langDropdown').classList.toggle('open');
  }

  async function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('typeui-lang', lang);
    const meta = LANGS[lang];
    document.getElementById('langFlag').textContent = meta.flag;
    document.getElementById('langCode').textContent = meta.code;
    document.querySelectorAll('.lang-item').forEach(el => {
      el.classList.toggle('active', el.getAttribute('onclick') === `setLang('${lang}')`);
    });
    document.getElementById('langBtn').classList.remove('open');
    document.getElementById('langDropdown').classList.remove('open');
    applyStaticTranslations();
    // Reload skills and current skill with new language
    const skillsRes = await fetch(`/api/skills?lang=${lang}`);
    allSkills = await skillsRes.json();
    renderSidebar(allSkills);
    if (currentSkill) {
      const slug = currentSkill.slug;
      document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
      document.getElementById('card-' + slug)?.classList.add('active');
      currentSkill = await fetch(`/api/skills/${slug}?lang=${lang}`).then(r => r.json());
      renderDetail(currentSkill);
    }
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('langSwitcher').contains(e.target)) {
      document.getElementById('langBtn').classList.remove('open');
      document.getElementById('langDropdown').classList.remove('open');
    }
  });

  // ── FETCH & INIT ──
  async function init() {
    const res = await fetch(`/api/skills?lang=${currentLang}`);
    allSkills = await res.json();
    setLang(currentLang);
    renderSidebar(allSkills);
    if (allSkills.length > 0) selectSkill(allSkills[0].slug);
  }

  // ── SIDEBAR ──
  function renderSidebar(skills) {
    const list = document.getElementById('skillList');
    list.innerHTML = skills.map(s => `
      <div class="skill-card" id="card-${s.slug}" onclick="selectSkill('${s.slug}')">
        <div class="skill-card-top">
          <div class="color-dot" style="background:${s.colors.primary}; box-shadow: 0 0 12px ${s.colors.primary}40"></div>
          <div>
            <div class="skill-card-name">${s.name}</div>
          </div>
        </div>
        <div class="skill-card-desc">${s.description}</div>
        <div class="mood-tags">${s.mood.map(m => `<span class="mood-tag">${m}</span>`).join('')}</div>
      </div>
    `).join('');
  }

  // ── SELECT SKILL ──
  async function selectSkill(slug) {
    document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('card-' + slug);
    if (card) card.classList.add('active');

    const res = await fetch(`/api/skills/${slug}?lang=${currentLang}`);
    currentSkill = await res.json();

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('skillDetail').style.display = 'block';
    renderDetail(currentSkill);
  }

  // ── HELPERS ──
  function colorRow(label, hex) {
    return `
      <div class="color-row" onclick="copyToClipboard('${hex}')">
        <div class="color-swatch" style="background:${hex}; box-shadow: 0 0 8px ${hex}30" title="Click to copy ${hex}"></div>
        <div class="color-info">
          <div class="color-label">${label}</div>
          <div class="color-hex">${hex}</div>
        </div>
      </div>`;
  }

  function typoRow(label, value) {
    const short = value.length > 28 ? value.split(',')[0] : value;
    return `
      <div class="typo-row">
        <span class="typo-label">${label}</span>
        <span class="typo-value" title="${value}">${short}</span>
      </div>`;
  }

  function editField(key, label, value) {
    return `
      <div class="edit-field">
        <label>${label}</label>
        <div class="edit-field-row">
          <div class="edit-color-preview" id="prev-${key}" style="background:${value}"></div>
          <input class="edit-input" id="edit-${key}" value="${value}"
            oninput="document.getElementById('prev-${key}').style.background=this.value">
        </div>
      </div>`;
  }

  // ── COPY PROMPT ──
  async function copyPrompt(slug) {
    const text = await fetch(`/api/skills/${slug}/prompt?lang=${currentLang}`).then(r => r.text());
    navigator.clipboard.writeText(text);
    showToast(t('toastCopied'));
    const btn = document.getElementById('copyBtn');
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = `<span>✓</span> ${t('copiedBtn')}`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<span>⎘</span> ${t('copyPromptBtn')}`;
      }, 2000);
    }
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    showToast(t('toastCopied'));
  }

  // ── BUTTON RADIUS PRESET ──
  function setBtnRadius(val) {
    const el = document.getElementById('edit-btnRadius');
    if (el) el.value = val;
  }

  // ── TOGGLE EDIT ──
  function toggleEdit() {
    const panel = document.getElementById('editPanel');
    panel.classList.toggle('open');
  }

  // ── SAVE EDIT ──
  async function saveEdit(slug) {
    const colors = {
      primary: document.getElementById('edit-primary')?.value,
      secondary: document.getElementById('edit-secondary')?.value,
      accent: document.getElementById('edit-accent')?.value,
      background: document.getElementById('edit-background')?.value,
      surface: document.getElementById('edit-surface')?.value,
      text: document.getElementById('edit-text')?.value,
    };
    const typography = {
      headingFont: document.getElementById('edit-headingFont')?.value,
      bodyFont: document.getElementById('edit-bodyFont')?.value,
    };
    const spacing = {
      buttonRadius: document.getElementById('edit-btnRadius')?.value,
    };
    const btnColor = document.getElementById('edit-btnColor')?.value;
    if (btnColor) colors.btnColor = btnColor;

    await fetch(`/api/skills/${slug}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ colors, typography, spacing }),
    });
    // Reload
    const res = await fetch(`/api/skills?lang=${currentLang}`);
    allSkills = await res.json();
    renderSidebar(allSkills);
    document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
    document.getElementById('card-' + slug)?.classList.add('active');
    const updated = await fetch(`/api/skills/${slug}?lang=${currentLang}`).then(r => r.json());
    currentSkill = updated;
    renderDetail(updated);
    showToast(t('toastUpdated'));
  }

  // ── SEARCH ──
  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderSidebar(allSkills.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.mood.some(m => m.includes(q)) ||
      s.description.toLowerCase().includes(q)
    ));
  });

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── PREVIEW ──
  let previewSize = 'desktop';

  function openPreview(slug) {
    const s = allSkills.find(x => x.slug === slug) || currentSkill;
    if (!s) return;

    document.getElementById('previewBadge').textContent = s.name;
    document.getElementById('previewOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderPreviewFrame(s);
  }

  function closePreview() {
    document.getElementById('previewOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function overlayClose(e) {
    if (e.target === document.getElementById('previewOverlay')) closePreview();
  }

  function setPreviewSize(size) {
    previewSize = size;
    const wrap = document.getElementById('previewFrameWrap');
    document.getElementById('btnDesktop').classList.toggle('active', size === 'desktop');
    document.getElementById('btnMobile').classList.toggle('active', size === 'mobile');
    wrap.classList.toggle('mobile', size === 'mobile');
  }

  function buildPreviewHTML(s) {

    document.getElementById('exportFormatBadge').className = `export-format-badge ${meta.cls}`;
    document.getElementById('exportFilename').textContent = _exportFilename;
    document.getElementById('exportCode').textContent = _exportContent;
    document.getElementById('exportOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
